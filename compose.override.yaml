services:
  php:
    environment:
      XDEBUG_MODE: off
    networks:
      default:
        aliases:
          - ${PUBLIC_API_HOST:-api.toastit.test}

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  inbound-smtp:
    build:
      context: .
      dockerfile: docker/inbound-smtp/Dockerfile
    environment:
      INBOUND_SMTP_HOST: 0.0.0.0
      INBOUND_SMTP_PORT: 2525
      TOASTIT_INBOUND_URL: http://php/api/inbound/email
      TOASTIT_INBOUND_SECRET: ${INBOUND_EMAIL_SECRET:-}
      INBOUND_SMTP_MAX_RECIPIENTS_PER_MESSAGE: 1
      INBOUND_SMTP_MAX_MESSAGES_PER_MINUTE: 10
      INBOUND_SMTP_RATE_WINDOW_SECONDS: 60
    ports:
      - "2525:2525"
    depends_on:
      - php

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["worker-entrypoint"]
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: 1
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      DEFAULT_URI: ${DEFAULT_URI}
      MAILER_DSN: ${MAILER_DSN}
      MAILER_FROM: ${MAILER_FROM}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
      INBOUND_EMAIL_DOMAIN: ${INBOUND_EMAIL_DOMAIN}
      INBOUND_EMAIL_SECRET: ${INBOUND_EMAIL_SECRET}
      XAI_API_KEY: ${XAI_API_KEY}
      XAI_BASE_URL: ${XAI_BASE_URL}
      XAI_MODEL: ${XAI_MODEL}
      XAI_TIMEOUT_SECONDS: ${XAI_TIMEOUT_SECONDS}
      PUBLIC_API_HOST: ${PUBLIC_API_HOST:-api.toastit.test}
      PUBLIC_API_HOST_PATTERN: ${PUBLIC_API_HOST_PATTERN:-^api\\.toastit\\.test$}
    volumes:
      - ./:/app
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      database:
        condition: service_healthy

  toastit-mcp:
    build:
      context: ../toastit-mcp
      dockerfile: Dockerfile
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3001
      MCP_TOASTIT_BASE_URL: http://${PUBLIC_API_HOST:-api.toastit.test}
      MCP_TOASTIT_ACCEPT: application/vnd.toastit.public+json; version=1
      MCP_TOASTIT_TIMEOUT_MS: 10000
      MCP_TOASTIT_PAT: ${MCP_TOASTIT_PAT:-}
    ports:
      - "${MCP_HTTP_PORT:-3001}:3001"
    depends_on:
      - php
