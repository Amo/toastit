services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: 1
      APP_SECRET: ${APP_SECRET}
      DEFAULT_URI: ${DEFAULT_URI}
      DATABASE_URL: ${DATABASE_URL}
      MAILER_DSN: ${MAILER_DSN}
      MAILER_FROM: ${MAILER_FROM}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
      INBOUND_EMAIL_DOMAIN: ${INBOUND_EMAIL_DOMAIN}
      INBOUND_EMAIL_SECRET: ${INBOUND_EMAIL_SECRET}
      XAI_API_KEY: ${XAI_API_KEY}
      XAI_BASE_URL: ${XAI_BASE_URL}
      XAI_MODEL: ${XAI_MODEL}
      XAI_TIMEOUT_SECONDS: ${XAI_TIMEOUT_SECONDS}
      PUBLIC_API_HOST: ${PUBLIC_API_HOST:-api.toastit.test}
      PUBLIC_API_HOST_PATTERN: ${PUBLIC_API_HOST_PATTERN:-^api\\.toastit\\.test$}
      SERVER_NAME: ${SERVER_NAME:-toastit.test, api.toastit.test}
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./:/app
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mariadb:${MARIADB_VERSION:-11.4}
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-app}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-!ChangeMe!}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-!ChangeRootMe!}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD || exit 1"]
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - database_data:/var/lib/mysql:rw
    ports:
      - "3306:3306"

volumes:
  database_data:
  caddy_data:
  caddy_config:
