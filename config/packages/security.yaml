security:
    role_hierarchy:
        ROLE_ROOT: [ROLE_ROUTE]

    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_users:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        public_api:
            host: '%env(PUBLIC_API_HOST_PATTERN)%'
            pattern: ^/
            stateless: true
            provider: app_users
            custom_authenticators:
                - App\Security\PersonalAccessTokenAuthenticator
        api:
            pattern: ^/api
            stateless: true
            provider: app_users
            custom_authenticators:
                - App\Security\AccessTokenAuthenticator

    access_control:
        - { path: ^/api/auth, roles: PUBLIC_ACCESS }
        - { path: ^/api/inbound/email$, roles: PUBLIC_ACCESS }
        - { path: ^/api/inbound/action/, roles: PUBLIC_ACCESS }
        - { host: '%env(PUBLIC_API_HOST_PATTERN)%', path: ^/doc/?$, roles: PUBLIC_ACCESS }
        - { host: '%env(PUBLIC_API_HOST_PATTERN)%', path: ^/, roles: ROLE_USER }
        - { path: ^/api/admin, roles: ROLE_ROUTE }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
