security:
    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_users:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_users
            custom_authenticators:
                - App\Security\OtpLoginAuthenticator
            logout:
                path: app_logout
                target: app_home

    access_control:
        - { path: ^/app, roles: ROLE_USER }
        - { path: ^/pin, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
