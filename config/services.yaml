imports:
    - { resource: ai_prompts.php }

# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.mailer_from: '%env(MAILER_FROM)%'
    app.default_uri: '%env(DEFAULT_URI)%'
    app.inbound_email_domain: '%env(default::INBOUND_EMAIL_DOMAIN)%'
    app.inbound_email_secret: '%env(default::INBOUND_EMAIL_SECRET)%'
    app.profile_avatar_storage_path: '%kernel.project_dir%/var/storage/profile/avatar'
    app.workspace_background_storage_path: '%kernel.project_dir%/var/storage/workspace/background'
    app.xai_base_url: '%env(XAI_BASE_URL)%'
    app.xai_model: '%env(XAI_MODEL)%'
    app.xai_advanced_model: '%env(default::XAI_ADVANCED_MODEL)%'
    app.xai_timeout_seconds: '%env(int:XAI_TIMEOUT_SECONDS)%'
    app.public_api_host: '%env(PUBLIC_API_HOST)%'
    app.public_api_host_pattern: '%env(PUBLIC_API_HOST_PATTERN)%'
    app.recaptcha_site_key: '%env(default::RECAPTCHA_SITE_KEY)%'
    app.recaptcha_project_id: '%env(default::RECAPTCHA_PROJECT_ID)%'
    app.recaptcha_min_score: '%env(float:RECAPTCHA_MIN_SCORE)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Mailer\TransactionalMailer:
        arguments:
            $defaultFrom: '%app.mailer_from%'
            $defaultUri: '%app.default_uri%'

    App\Routing\AppUrlGenerator:
        arguments:
            $defaultUri: '%app.default_uri%'

    App\Controller\SpaController:
        arguments:
            $recaptchaSiteKey: '%app.recaptcha_site_key%'
            $publicApiHost: '%app.public_api_host%'

    App\Workspace\InboundEmailAddressService:
        arguments:
            $inboundEmailDomain: '%app.inbound_email_domain%'

    App\Workspace\InboundReplyAddressService:
        arguments:
            $inboundEmailDomain: '%app.inbound_email_domain%'

    App\Controller\Api\Inbound\ReceiveEmailController:
        arguments:
            $inboundEmailSecret: '%app.inbound_email_secret%'

    App\Ai\AiPromptFileStore:
        arguments:
            $promptFiles: '%app.ai_prompt_files%'

    app.profile_avatar_adapter:
        class: League\Flysystem\Local\LocalFilesystemAdapter
        arguments:
            - '%app.profile_avatar_storage_path%'

    app.profile_avatar_filesystem:
        class: League\Flysystem\Filesystem
        arguments:
            - '@app.profile_avatar_adapter'

    App\Profile\AvatarStorageService:
        arguments:
            $filesystem: '@app.profile_avatar_filesystem'
            $storagePath: '%app.profile_avatar_storage_path%'

    League\CommonMark\CommonMarkConverter:
        class: League\CommonMark\CommonMarkConverter

    app.workspace_background_adapter:
        class: League\Flysystem\Local\LocalFilesystemAdapter
        arguments:
            - '%app.workspace_background_storage_path%'

    app.workspace_background_filesystem:
        class: League\Flysystem\Filesystem
        arguments:
            - '@app.workspace_background_adapter'

    App\Workspace\WorkspaceBackgroundStorageService:
        arguments:
            $filesystem: '@app.workspace_background_filesystem'
            $storagePath: '%app.workspace_background_storage_path%'

    App\Security\JwtTokenService:
        arguments:
            $secret: '%env(APP_SECRET)%'

    App\Security\RecaptchaVerifierService:
        arguments:
            $siteKey: '%app.recaptcha_site_key%'
            $projectId: '%app.recaptcha_project_id%'
            $minimumScore: '%app.recaptcha_min_score%'

    App\Security\PersonalAccessTokenAuthenticator:
        arguments:
            $publicApiHost: '%app.public_api_host%'

    App\PublicApi\PublicApiVersionService:
        arguments:
            $publicApiHost: '%app.public_api_host%'

    App\Meeting\XaiTextService:
        arguments:
            $apiKey: '%env(default::XAI_API_KEY)%'
            $baseUrl: '%app.xai_base_url%'
            $model: '%app.xai_model%'
            $advancedModel: '%app.xai_advanced_model%'
            $timeoutSeconds: '%app.xai_timeout_seconds%'
