<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName toastit.cc
    ServerAlias www.toastit.cc

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass / http://127.0.0.1:8084/
    ProxyPassReverse / http://127.0.0.1:8084/

    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/toastit.cc/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/toastit.cc/privkey.pem

    ErrorLog ${APACHE_LOG_DIR}/toastit_error.log
    CustomLog ${APACHE_LOG_DIR}/toastit_access.log combined
</VirtualHost>
</IfModule>
