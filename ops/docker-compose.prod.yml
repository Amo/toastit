services:
  app:
    build:
      context: ..
      dockerfile: ops/Dockerfile.frankenphp
    image: ${APP_IMAGE:-toastit:latest}
    command: ["--config", "/etc/frankenphp/Caddyfile"]
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_SECRET: ${APP_SECRET}
      DEFAULT_URI: ${DEFAULT_URI}
      PUBLIC_API_HOST: ${PUBLIC_API_HOST}
      PUBLIC_API_HOST_PATTERN: ${PUBLIC_API_HOST_PATTERN}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MAILER_DSN: ${MAILER_DSN}
      MAILER_FROM: ${MAILER_FROM}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
      INBOUND_EMAIL_DOMAIN: ${INBOUND_EMAIL_DOMAIN}
      INBOUND_EMAIL_SECRET: ${INBOUND_EMAIL_SECRET}
      XAI_API_KEY: ${XAI_API_KEY}
      XAI_BASE_URL: ${XAI_BASE_URL}
      XAI_MODEL: ${XAI_MODEL}
      XAI_TIMEOUT_SECONDS: ${XAI_TIMEOUT_SECONDS}
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
      RECAPTCHA_PROJECT_ID: ${RECAPTCHA_PROJECT_ID}
      RECAPTCHA_MIN_SCORE: ${RECAPTCHA_MIN_SCORE}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "127.0.0.1:${APP_BIND_PORT}:80"
    volumes:
      - app_media:/app/public/media
      - app_var:/app/var

  worker:
    build:
      context: ..
      dockerfile: ops/Dockerfile.frankenphp
    image: ${APP_IMAGE:-toastit:latest}
    entrypoint: ["worker-entrypoint"]
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_SECRET: ${APP_SECRET}
      DEFAULT_URI: ${DEFAULT_URI}
      PUBLIC_API_HOST: ${PUBLIC_API_HOST}
      PUBLIC_API_HOST_PATTERN: ${PUBLIC_API_HOST_PATTERN}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      MAILER_DSN: ${MAILER_DSN}
      MAILER_FROM: ${MAILER_FROM}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
      INBOUND_EMAIL_DOMAIN: ${INBOUND_EMAIL_DOMAIN}
      INBOUND_EMAIL_SECRET: ${INBOUND_EMAIL_SECRET}
      XAI_API_KEY: ${XAI_API_KEY}
      XAI_BASE_URL: ${XAI_BASE_URL}
      XAI_MODEL: ${XAI_MODEL}
      XAI_TIMEOUT_SECONDS: ${XAI_TIMEOUT_SECONDS}
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
      RECAPTCHA_PROJECT_ID: ${RECAPTCHA_PROJECT_ID}
      RECAPTCHA_MIN_SCORE: ${RECAPTCHA_MIN_SCORE}
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - app_media:/app/public/media
      - app_var:/app/var

  database:
    image: mariadb:${MARIADB_VERSION:-11.4}
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql

  inbound-smtp:
    build:
      context: ..
      dockerfile: docker/inbound-smtp/Dockerfile
    image: ${INBOUND_SMTP_IMAGE:-toastit-inbound-smtp:latest}
    restart: unless-stopped
    environment:
      INBOUND_SMTP_HOST: 0.0.0.0
      INBOUND_SMTP_PORT: 2525
      TOASTIT_INBOUND_URL: http://app/api/inbound/email
      TOASTIT_INBOUND_SECRET: ${INBOUND_EMAIL_SECRET}
      TOASTIT_INBOUND_TIMEOUT_SECONDS: 30
      INBOUND_SMTP_MAX_RECIPIENTS_PER_MESSAGE: ${INBOUND_SMTP_MAX_RECIPIENTS_PER_MESSAGE:-1}
      INBOUND_SMTP_MAX_MESSAGES_PER_MINUTE: ${INBOUND_SMTP_MAX_MESSAGES_PER_MINUTE:-10}
      INBOUND_SMTP_RATE_WINDOW_SECONDS: ${INBOUND_SMTP_RATE_WINDOW_SECONDS:-60}
    depends_on:
      - app
    ports:
      - "${INBOUND_SMTP_BIND_PORT:-2525}:2525"

volumes:
  db_data:
  app_media:
  app_var:
